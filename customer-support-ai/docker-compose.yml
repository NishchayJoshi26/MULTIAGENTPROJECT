version: '3.9'

services:
  backend:
    build: .
    container_name: customer-support-backend
    ports:
      - "8000:8000"
    environment:
      APP_ENV: development
      MONGODB_URI: mongodb://mongo:27017
      MONGODB_DB_NAME: customer_support_ai
      JWT_SECRET: replace-with-a-secure-secret
      JWT_REFRESH_SECRET: replace-with-a-secure-refresh-secret
      GEMINI_API_KEY: replace-with-gemini-key
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    container_name: customer-support-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
